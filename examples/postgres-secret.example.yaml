# Replace the password before applying:
#   kubectl create secret generic reputation-postgres-secret -n reputation \
#     --from-literal=POSTGRES_USER=reputation \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 24)" \
#     --from-literal=POSTGRES_DB=reputation \
#     --dry-run=client -o yaml > reputation/postgres-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: reputation-postgres-secret
  namespace: reputation
type: Opaque
stringData:
  POSTGRES_USER: reputation
  POSTGRES_PASSWORD: CHANGE_ME_BEFORE_APPLYING
  POSTGRES_DB: reputation
