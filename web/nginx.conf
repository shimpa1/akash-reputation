# Full main nginx config (replaces the image default). worker_processes is
# pinned low because `auto` spawns one worker per CPU — on a large node (e.g.
# 256 cores) that OOMs a small container. A static SPA needs very few workers.
worker_processes 2;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # SPA: serve static assets, fall back to index.html for client routes.
        # API paths are routed to the API service by the gateway, not here.
        location / {
            try_files $uri $uri/ /index.html;
        }

        location /assets/ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
