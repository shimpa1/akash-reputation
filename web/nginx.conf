server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: serve static assets, fall back to index.html for client-side routes.
    # API paths (/reputation, /feedback, /leases, /info, /healthz) are routed to
    # the API service by the gateway and never reach this server.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
